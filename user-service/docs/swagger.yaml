basePath: /api/v1
definitions:
  dto.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  dto.LoginResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/dto.UserResponse'
    type: object
  dto.RegisterRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        minLength: 6
        type: string
      role:
        enum:
        - admin
        - staff
        - user
        type: string
    required:
    - email
    - name
    - password
    type: object
  dto.UpdateProfileRequest:
    properties:
      name:
        type: string
      password:
        minLength: 6
        type: string
    type: object
  dto.UserResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: integer
      is_active:
        type: boolean
      name:
        type: string
      role:
        type: string
    type: object
  dto.VerifyOTPRequest:
    properties:
      code:
        type: string
      email:
        type: string
    required:
    - code
    - email
    type: object
  dto.WebResponse-any:
    properties:
      code:
        type: integer
      data: {}
      errors: {}
      message:
        type: string
      status:
        type: string
    type: object
  dto.WebResponse-array_dto_UserResponse:
    properties:
      code:
        type: integer
      data:
        items:
          $ref: '#/definitions/dto.UserResponse'
        type: array
      errors: {}
      message:
        type: string
      status:
        type: string
    type: object
  dto.WebResponse-dto_LoginResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/dto.LoginResponse'
      errors: {}
      message:
        type: string
      status:
        type: string
    type: object
  dto.WebResponse-dto_UserResponse:
    properties:
      code:
        type: integer
      data:
        $ref: '#/definitions/dto.UserResponse'
      errors: {}
      message:
        type: string
      status:
        type: string
    type: object
host: localhost:8081
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: API Server for Concert Ticketing User Service
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: User Service API
  version: "1.0"
paths:
  /auth/force-logout:
    post:
      description: Invalidate all active tokens for the user
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.WebResponse-any'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.WebResponse-any'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.WebResponse-any'
      security:
      - BearerAuth: []
      summary: Force logout from all devices
      tags:
      - Auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Login with email and password to receive a JWT token
      parameters:
      - description: Login request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.WebResponse-dto_LoginResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.WebResponse-any'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.WebResponse-any'
      summary: User login
      tags:
      - Auth
  /auth/logout:
    post:
      description: Invalidate the current session token (blacklists it in Redis)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.WebResponse-any'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/dto.WebResponse-any'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.WebResponse-any'
      security:
      - BearerAuth: []
      summary: User logout
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Register a new user with name, email, password, and optional role
      parameters:
      - description: Register request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/dto.WebResponse-dto_UserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.WebResponse-any'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.WebResponse-any'
      summary: Register a new user
      tags:
      - Auth
  /auth/verify-otp:
    post:
      consumes:
      - application/json
      description: Verify the OTP code sent to user email to activate the account
      parameters:
      - description: Verify OTP request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.VerifyOTPRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.WebResponse-any'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.WebResponse-any'
      summary: Verify user registration OTP
      tags:
      - Auth
  /health:
    get:
      description: Get service, database, and redis connection status
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.WebResponse-any'
      summary: Health check
      tags:
      - Health
  /users:
    get:
      description: Retrieve a list of all registered users. Restricted to admin and
        staff.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.WebResponse-array_dto_UserResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.WebResponse-any'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.WebResponse-any'
      security:
      - BearerAuth: []
      summary: List all users
      tags:
      - Users
  /users/{id}:
    get:
      description: Fetch user profile details. A standard user can only retrieve their
        own ID. Admin/staff can retrieve any.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.WebResponse-dto_UserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.WebResponse-any'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.WebResponse-any'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.WebResponse-any'
      security:
      - BearerAuth: []
      summary: Get user profile
      tags:
      - Users
    put:
      consumes:
      - application/json
      description: Update profile details (name, password). Standard user can only
        update their own. Admin/staff can update any.
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      - description: Update profile request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.UpdateProfileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.WebResponse-dto_UserResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/dto.WebResponse-any'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/dto.WebResponse-any'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/dto.WebResponse-any'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/dto.WebResponse-any'
      security:
      - BearerAuth: []
      summary: Update user profile
      tags:
      - Users
securityDefinitions:
  BearerAuth:
    description: Type "Bearer <your_token>" to authenticate.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
